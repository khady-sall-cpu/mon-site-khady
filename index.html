<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ouldadah Shop</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

header {
    background: #000;
    color: white;
    text-align: center;
    padding: 20px;
}

h1 {
    margin: 0;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.produit {
    background: white;
    margin: 15px;
    padding: 15px;
    border-radius: 10px;
    width: 250px;
    text-align: center;
}

.produit img {
    width: 100%;
    border-radius: 10px;
}

button {
    background: green;
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
}

footer {
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<header>
    <h1>Ouldadah Shop</h1>
    <p>Boutique de tenues pour femme musulmane</p>
</header>

<div class="container">

    <div class="produit">
        <img src="djilbab1.jpg">
        <h3>Djilbab Noir</h3>
        <p>Prix : 15 000 FCFA</p>
        <button onclick="commander('Djilbab Noir')">Commander</button>
    </div>

    <div class="produit">
        <img src="djilbab2.jpg">
        <h3>Djilbab Beige</h3>
        <p>Prix : 18 000 FCFA</p>
        <button onclick="commander('Djilbab Beige')">Commander</button>
    </div>

    <div class="produit">
        <img src="djilbab3.jpg">
        <h3>Djilbab Bleu</h3>
        <p>Prix : 17 000 FCFA</p>
        <button onclick="commander('Djilbab Bleu')">Commander</button>
    </div>

</div>

<footer>
    <p>Contact : 766129958 / 706942799</p>
</footer>

<script>
function commander(produit) {
    let numero = "221766129958";
    let message = "Bonjour, je veux commander : " + produit;
    let url = "https://wa.me/" + numero + "?text=" + encodeURIComponent(message);
    window.open(url);
}
</script>

</body>
</html>
